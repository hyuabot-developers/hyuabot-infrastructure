# Deploy API Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyuabot-backend-kotlin
  namespace: hyuabot
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: hyuabot-backend-kotlin
  template:
    metadata:
      labels:
        app: hyuabot-backend-kotlin
    spec:
      terminationGracePeriodSeconds: 80
      containers:
      - name: api
        image: localhost:5000/hyuabot-backend-kotlin:latest
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=75.0"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 15"]
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
---
# Service for API Server
apiVersion: v1
kind: Service
metadata:
  name: hyuabot-backend-kotlin-service
  namespace: hyuabot
spec:
  selector:
    app: hyuabot-backend-kotlin
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080