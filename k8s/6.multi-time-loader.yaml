# Subway Realtime Loader
apiVersion: batch/v1
kind: CronJob
metadata:
  name: subway-realtime-cron-job
  namespace: hyuabot
spec:
  # Full Metro key (count=60): daily quota 10,000 calls, 2 routes per run.
  # Service hours 05:00-02:00 KST = 21h (1,260 min). Looped every 20s (3 runs/min
  # -> 6 calls/min): 1,260 * 6 = ~7,560 calls/day. (15s/4-runs would be 10,080,
  # over quota.) Tuned via LOOP_ITERATIONS / LOOP_INTERVAL_SECONDS below.
  schedule: "* 0,1,5-23 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          containers:
          - name: subway-realtime-cron-job
            image: localhost:5000/hyuabot-subway-realtime-updater
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "512Mi"
                cpu: "250m"
            env:
            - name: LOOP_ITERATIONS
              value: "3"
            - name: LOOP_INTERVAL_SECONDS
              value: "20"
            - name: POSTGRES_ID
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: DB_ID
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: DB_PASSWORD
            - name: POSTGRES_HOST
              value: hyuabot-database
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: hyuabot
            - name: METRO_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: METRO_API_KEY
          restartPolicy: OnFailure
---
