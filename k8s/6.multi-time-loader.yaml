metadata:
  name: holiday-cron-job
  namespace: hyuabot
spec:
  schedule: "10 3 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 600
      backoffLimit: 3
      template:
        spec:
          containers:
          - name: holiday-cron-job
            image: localhost:5000/hyuabot-holiday-updater
            resources:
              requests:
                memory: "64Mi"
                cpu: "25m"
              limits:
                memory: "256Mi"
                cpu: "200m"
            env:
            - name: DATA_GO_KR_API_KEY
              valueFrom:
