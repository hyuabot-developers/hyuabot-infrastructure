# Bus Realtime Loader
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bus-realtime-cron-job
  namespace: hyuabot
spec:
  # Sample GBIS key: unlimited daily quota, so refresh as fast as useful.
  # Service hours 05:00-02:00 KST = 21h. Looped every 10s (6 runs/min) via
  # LOOP_* env below; concurrencyPolicy Forbid keeps runs from overlapping.
  schedule: "* 0,1,5-23 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          containers:
          - name: bus-realtime-cron-job
            image: localhost:5000/hyuabot-bus-realtime-updater
            resources:
              requests:
                memory: "128Mi"
                cpu: "50m"
              limits:
                memory: "512Mi"
                cpu: "250m"
            env:
            - name: LOOP_ITERATIONS
              value: "6"
            - name: LOOP_INTERVAL_SECONDS
              value: "10"
            - name: POSTGRES_ID
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: DB_ID
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: DB_PASSWORD
            - name: POSTGRES_HOST
              value: hyuabot-database
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: hyuabot
          restartPolicy: OnFailure
---
# Korean Public Holiday Loader
apiVersion: batch/v1
