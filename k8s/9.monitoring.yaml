---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hyuabot
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: hyuabot-backend-kotlin
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["hyuabot-backend-kotlin-service:8080"]
      - job_name: node-exporter
        static_configs:
          - targets: ["node-exporter:9100"]
      - job_name: redis-exporter
        static_configs:
          - targets: ["hyuabot-redis-exporter:9121"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hyuabot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hyuabot
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: hyuabot
spec:
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--path.rootfs=/host/root"
            - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)"
          ports:
            - containerPort: 9100
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: hyuabot
spec:
  selector:
    app: node-exporter
  ports:
    - protocol: TCP
      port: 9100
      targetPort: 9100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: hyuabot
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: hyuabot
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: hyuabot
data:
  hyuabot-backend.json: |
    {
      "title": "HYUabot Backend",
      "uid": "hyuabot-backend",
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "application",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(jvm_info, application)",
            "refresh": 1,
            "includeAll": false
          }
        ]
      },
      "panels": [
        { "type": "row", "title": "Overview", "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 } },
        {
          "title": "DB pending (waiting)", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }, "color": { "mode": "thresholds" } }, "overrides": [] },
          "targets": [ { "expr": "max(hikaricp_connections_pending{application=\"$application\"})", "refId": "A" } ]
        },
        {
          "title": "DB active", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "targets": [ { "expr": "max(hikaricp_connections_active{application=\"$application\"})", "refId": "A" } ]
        },
        {
          "title": "Heap used %", "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 75 }, { "color": "red", "value": 90 } ] } }, "overrides": [] },
          "targets": [ { "expr": "100 * sum(jvm_memory_used_bytes{application=\"$application\", area=\"heap\"}) / sum(jvm_memory_max_bytes{application=\"$application\", area=\"heap\"})", "refId": "A" } ]
        },
        {
          "title": "HTTP req/s", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "expr": "sum(rate(http_server_requests_seconds_count{application=\"$application\"}[5m]))", "refId": "A" } ]
        },
        {
          "title": "HTTP 5xx %", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 } ] }, "color": { "mode": "thresholds" } }, "overrides": [] },
          "targets": [ { "expr": "100 * (sum(rate(http_server_requests_seconds_count{application=\"$application\", status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_server_requests_seconds_count{application=\"$application\"}[5m])), 0.001)", "refId": "A" } ]
        },
        {
          "title": "Node CPU %", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 } ] }, "color": { "mode": "thresholds" } }, "overrides": [] },
          "targets": [ { "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))", "refId": "A" } ]
        },

        { "type": "row", "title": "DB Pool (HikariCP)", "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 } },
        {
          "title": "Connections", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 6 },
          "targets": [
            { "expr": "hikaricp_connections_active{application=\"$application\"}", "legendFormat": "active", "refId": "A" },
            { "expr": "hikaricp_connections_idle{application=\"$application\"}", "legendFormat": "idle", "refId": "B" },
            { "expr": "hikaricp_connections_pending{application=\"$application\"}", "legendFormat": "pending", "refId": "C" },
            { "expr": "hikaricp_connections_max{application=\"$application\"}", "legendFormat": "max", "refId": "D" }
          ]
        },
        {
          "title": "Pending (waiting threads)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 6 },
          "targets": [ { "expr": "hikaricp_connections_pending{application=\"$application\"}", "legendFormat": "pending", "refId": "A" } ]
        },
        {
          "title": "Acquire time", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 13 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            { "expr": "rate(hikaricp_connections_acquire_seconds_sum{application=\"$application\"}[5m]) / clamp_min(rate(hikaricp_connections_acquire_seconds_count{application=\"$application\"}[5m]), 0.001)", "legendFormat": "avg", "refId": "A" },
            { "expr": "hikaricp_connections_acquire_seconds_max{application=\"$application\"}", "legendFormat": "max", "refId": "B" }
          ]
        },
        {
          "title": "Connection timeouts", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 13 },
          "targets": [ { "expr": "rate(hikaricp_connections_timeout_total{application=\"$application\"}[5m])", "legendFormat": "timeouts/s", "refId": "A" } ]
        },
        {
          "title": "Usage time", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 13 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            { "expr": "rate(hikaricp_connections_usage_seconds_sum{application=\"$application\"}[5m]) / clamp_min(rate(hikaricp_connections_usage_seconds_count{application=\"$application\"}[5m]), 0.001)", "legendFormat": "avg", "refId": "A" }
          ]
        },

        { "type": "row", "title": "HTTP", "gridPos": { "h": 1, "w": 24, "x": 0, "y": 20 } },
        {
          "title": "Request rate by status", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 21 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "expr": "sum by (status) (rate(http_server_requests_seconds_count{application=\"$application\"}[5m]))", "legendFormat": "{{status}}", "refId": "A" } ]
        },
        {
          "title": "Error rate %", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 21 },
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] },
          "targets": [ { "expr": "100 * (sum(rate(http_server_requests_seconds_count{application=\"$application\", status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_server_requests_seconds_count{application=\"$application\"}[5m])), 0.001)", "legendFormat": "5xx %", "refId": "A" } ]
        },
        {
          "title": "Latency percentiles", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 28 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            { "expr": "histogram_quantile(0.5, sum by (le) (rate(http_server_requests_seconds_bucket{application=\"$application\"}[5m])))", "legendFormat": "p50", "refId": "A" },
            { "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{application=\"$application\"}[5m])))", "legendFormat": "p95", "refId": "B" },
            { "expr": "histogram_quantile(0.99, sum by (le) (rate(http_server_requests_seconds_bucket{application=\"$application\"}[5m])))", "legendFormat": "p99", "refId": "C" }
          ]
        },
        {
          "title": "Top endpoints (req/s)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 28 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "expr": "topk(5, sum by (uri) (rate(http_server_requests_seconds_count{application=\"$application\"}[5m])))", "legendFormat": "{{uri}}", "refId": "A" } ]
        },

        {
          "title": "Non-2XX requests (URI × status)", "type": "table",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 35 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [ { "matcher": { "id": "byName", "options": "Value" }, "properties": [ { "id": "displayName", "value": "Requests (1h)" } ] } ] },
          "options": { "sortBy": [ { "displayName": "Requests (1h)", "desc": true } ] },
          "targets": [ { "expr": "sort_desc(sum by (uri, status) (increase(http_server_requests_seconds_count{application=\"$application\", status!~\"2..\"}[1h])))", "format": "table", "instant": true, "legendFormat": "", "refId": "A" } ],
          "transformations": [ { "id": "organize", "options": { "excludeByName": { "Time": true, "application": true, "instance": true, "job": true }, "renameByName": { "uri": "URI", "status": "Status Code", "Value": "Requests (1h)" } } } ]
        },

        { "type": "row", "title": "JVM", "gridPos": { "h": 1, "w": 24, "x": 0, "y": 44 } },
        {
          "title": "Memory", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 45 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            { "expr": "sum(jvm_memory_used_bytes{application=\"$application\", area=\"heap\"})", "legendFormat": "heap used", "refId": "A" },
            { "expr": "sum(jvm_memory_max_bytes{application=\"$application\", area=\"heap\"})", "legendFormat": "heap max", "refId": "B" },
            { "expr": "sum(jvm_memory_used_bytes{application=\"$application\", area=\"nonheap\"})", "legendFormat": "nonheap used", "refId": "C" }
          ]
        },
        {
          "title": "GC pause", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 45 },
          "targets": [
            { "expr": "sum(rate(jvm_gc_pause_seconds_sum{application=\"$application\"}[5m]))", "legendFormat": "pause time/s", "refId": "A" },
            { "expr": "sum(rate(jvm_gc_pause_seconds_count{application=\"$application\"}[5m]))", "legendFormat": "pauses/s", "refId": "B" }
          ]
        },
        {
          "title": "Threads", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 52 },
          "targets": [
            { "expr": "jvm_threads_live_threads{application=\"$application\"}", "legendFormat": "live", "refId": "A" },
            { "expr": "jvm_threads_daemon_threads{application=\"$application\"}", "legendFormat": "daemon", "refId": "B" },
            { "expr": "jvm_threads_peak_threads{application=\"$application\"}", "legendFormat": "peak", "refId": "C" }
          ]
        },
        {
          "title": "Allocation rate", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 52 },
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "targets": [ { "expr": "rate(jvm_gc_memory_allocated_bytes_total{application=\"$application\"}[5m])", "legendFormat": "allocated/s", "refId": "A" } ]
        },
        {
          "title": "Classes loaded", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 52 },
          "targets": [ { "expr": "jvm_classes_loaded_classes{application=\"$application\"}", "legendFormat": "loaded", "refId": "A" } ]
        },

        { "type": "row", "title": "System (Node)", "gridPos": { "h": 1, "w": 24, "x": 0, "y": 59 } },
        {
          "title": "CPU by mode", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 60 },
          "fieldConfig": { "defaults": { "unit": "percentunit" }, "overrides": [] },
          "targets": [ { "expr": "sum by (mode) (rate(node_cpu_seconds_total{mode!=\"idle\"}[5m]))", "legendFormat": "{{mode}}", "refId": "A" } ]
        },
        {
          "title": "Memory", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 60 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            { "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes", "legendFormat": "used", "refId": "A" },
            { "expr": "node_memory_MemTotal_bytes", "legendFormat": "total", "refId": "B" }
          ]
        },
        {
          "title": "Filesystem usage % (/)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 67 },
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] },
          "targets": [ { "expr": "100 * (1 - node_filesystem_avail_bytes{mountpoint=\"/\", fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\", fstype!~\"tmpfs|overlay\"})", "legendFormat": "{{mountpoint}}", "refId": "A" } ]
        },
        {
          "title": "Disk I/O", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 67 },
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "targets": [
            { "expr": "sum(rate(node_disk_read_bytes_total[5m]))", "legendFormat": "read", "refId": "A" },
            { "expr": "sum(rate(node_disk_written_bytes_total[5m]))", "legendFormat": "write", "refId": "B" }
          ]
        },
        {
          "title": "Network", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 67 },
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] },
          "targets": [
            { "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m]))", "legendFormat": "rx", "refId": "A" },
            { "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m]))", "legendFormat": "tx", "refId": "B" }
          ]
        },
        {
          "title": "Load average", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 74 },
          "targets": [
            { "expr": "node_load1", "legendFormat": "1m", "refId": "A" },
            { "expr": "node_load5", "legendFormat": "5m", "refId": "B" },
            { "expr": "node_load15", "legendFormat": "15m", "refId": "C" }
          ]
        },

        { "type": "row", "title": "Cache (Spring/Redis)", "gridPos": { "h": 1, "w": 24, "x": 0, "y": 80 } },
        {
          "title": "Hit ratio (overall)", "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 81 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 50 }, { "color": "green", "value": 80 } ] }, "color": { "mode": "thresholds" } }, "overrides": [] },
          "targets": [ { "expr": "100 * sum(rate(cache_gets_total{application=\"$application\", result=\"hit\"}[5m])) / clamp_min(sum(rate(cache_gets_total{application=\"$application\"}[5m])), 0.001)", "refId": "A" } ]
        },
        {
          "title": "Hit ratio by cache", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 18, "x": 6, "y": 81 },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 }, "overrides": [] },
          "targets": [ { "expr": "sum by (cache) (rate(cache_gets_total{application=\"$application\", result=\"hit\"}[5m])) / clamp_min(sum by (cache) (rate(cache_gets_total{application=\"$application\"}[5m])), 0.001)", "legendFormat": "{{cache}}", "refId": "A" } ]
        },
        {
          "title": "Gets by result (hit/miss)", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 87 },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "targets": [ { "expr": "sum by (cache, result) (rate(cache_gets_total{application=\"$application\"}[5m]))", "legendFormat": "{{cache}} {{result}}", "refId": "A" } ]
        },
        {
          "title": "Puts & removals by cache", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 87 },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "targets": [
            { "expr": "sum by (cache) (rate(cache_puts_total{application=\"$application\"}[5m]))", "legendFormat": "{{cache}} puts", "refId": "A" },
            { "expr": "sum by (cache) (rate(cache_removals_total{application=\"$application\"}[5m]))", "legendFormat": "{{cache}} removals", "refId": "B" }
          ]
        },
        {
          "title": "Redis hit ratio (server)", "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 94 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 50 }, { "color": "green", "value": 80 } ] }, "color": { "mode": "thresholds" } }, "overrides": [] },
          "targets": [ { "expr": "100 * rate(redis_keyspace_hits_total[5m]) / clamp_min(rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]), 0.001)", "refId": "A" } ]
        },
        {
          "title": "Redis memory used %", "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 94 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 80 }, { "color": "red", "value": 95 } ] }, "color": { "mode": "thresholds" } }, "overrides": [] },
          "targets": [ { "expr": "100 * redis_memory_used_bytes / clamp_min(redis_memory_max_bytes, 1)", "refId": "A" } ]
        },
        {
          "title": "Cached keys", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 94 },
          "targets": [ { "expr": "sum(redis_db_keys)", "refId": "A" } ]
        },
        {
          "title": "Connected clients", "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 94 },
          "targets": [ { "expr": "redis_connected_clients", "refId": "A" } ]
        },
        {
          "title": "Evicted / expired keys", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 100 },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "targets": [
            { "expr": "rate(redis_evicted_keys_total[5m])", "legendFormat": "evicted", "refId": "A" },
            { "expr": "rate(redis_expired_keys_total[5m])", "legendFormat": "expired", "refId": "B" }
          ]
        },
        {
          "title": "Keyspace hits vs misses", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 100 },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "targets": [
            { "expr": "rate(redis_keyspace_hits_total[5m])", "legendFormat": "hits", "refId": "A" },
            { "expr": "rate(redis_keyspace_misses_total[5m])", "legendFormat": "misses", "refId": "B" }
          ]
        },
        {
          "title": "Redis memory used", "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 107 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            { "expr": "redis_memory_used_bytes", "legendFormat": "used", "refId": "A" },
            { "expr": "redis_memory_max_bytes", "legendFormat": "maxmemory", "refId": "B" }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: hyuabot
data:
  alerting.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: http-errors
        folder: HYUabot
        interval: 1m
        rules:
          - uid: http-5xx-ratio-high
            title: HTTP 5xx ratio high
            condition: C
            for: 5m
            noDataState: OK
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "HTTP 5xx ratio above 5% for 5m"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: "100 * (sum(rate(http_server_requests_seconds_count{application=\"hyuabot-backend-kotlin\", status=~\"5..\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_server_requests_seconds_count{application=\"hyuabot-backend-kotlin\"}[5m])), 0.001)"
                  instant: false
                  range: true
                  intervalMs: 15000
                  maxDataPoints: 43200
              - refId: B
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  reducer: last
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [5]
          - uid: http-5xx-rate-high
            title: HTTP 5xx rate high
            condition: C
            for: 5m
            noDataState: OK
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "HTTP 5xx rate above 0.5/s for 5m"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: "sum(rate(http_server_requests_seconds_count{application=\"hyuabot-backend-kotlin\", status=~\"5..\"}[5m])) or vector(0)"
                  instant: false
                  range: true
                  intervalMs: 15000
                  maxDataPoints: 43200
              - refId: B
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  reducer: last
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0.5]
      - orgId: 1
        name: cache
        folder: HYUabot
        interval: 1m
        rules:
          - uid: redis-evictions-high
            title: Redis key evictions
            condition: C
            for: 5m
            noDataState: OK
            execErrState: Error
            labels:
              severity: warning
            annotations:
              summary: "Redis is evicting keys (allkeys-lru memory pressure) for 5m — cache hit ratio will degrade"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: "sum(rate(redis_evicted_keys_total[5m])) or vector(0)"
                  instant: false
                  range: true
                  intervalMs: 15000
                  maxDataPoints: 43200
              - refId: B
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: A
                  reducer: last
              - refId: C
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  datasource:
                    type: __expr__
                    uid: __expr__
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: email-ops
        receivers:
          - uid: email-ops
            type: email
            settings:
              addresses: ${GRAFANA_OPS_EMAIL}
    policies:
      - orgId: 1
        receiver: email-ops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: hyuabot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.hyuabot.app"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/hyuabot-backend.json"
            - name: GF_SMTP_ENABLED
              value: "true"
            - name: GF_SMTP_HOST
              value: "smtp.gmail.com:587"
            - name: GF_SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: GRAFANA_SMTP_FROM_ADDRESS
            - name: GF_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: GRAFANA_SMTP_PASSWORD
            - name: GF_SMTP_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: GRAFANA_SMTP_FROM_ADDRESS
            - name: GRAFANA_OPS_EMAIL
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: GRAFANA_OPS_EMAIL
            - name: GF_SMTP_FROM_NAME
              value: "HYUabot Grafana"
            - name: GF_SMTP_STARTTLS_POLICY
              value: "MandatoryStartTLS"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: alerting
          configMap:
            name: grafana-alerting
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: hyuabot
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300
