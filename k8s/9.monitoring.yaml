---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hyuabot
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: hyuabot-backend-kotlin
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["hyuabot-backend-kotlin-service:8080"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hyuabot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hyuabot
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: hyuabot
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: hyuabot
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: hyuabot
data:
  hyuabot-backend.json: |
    {
      "title": "HYUabot Backend (JVM / HikariCP / HTTP)",
      "uid": "hyuabot-backend",
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "application",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(jvm_info, application)",
            "refresh": 1,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "title": "HikariCP connections",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "line" } }, "overrides": [] },
          "targets": [
            { "expr": "hikaricp_connections_active{application=\"$application\"}", "legendFormat": "active", "refId": "A" },
            { "expr": "hikaricp_connections_idle{application=\"$application\"}", "legendFormat": "idle", "refId": "B" },
            { "expr": "hikaricp_connections_pending{application=\"$application\"}", "legendFormat": "pending (waiting)", "refId": "C" },
            { "expr": "hikaricp_connections_max{application=\"$application\"}", "legendFormat": "max", "refId": "D" }
          ]
        },
        {
          "title": "Connection timeouts (rate)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "rate(hikaricp_connections_timeout_total{application=\"$application\"}[5m])", "legendFormat": "timeouts/s", "refId": "A" }
          ]
        },
        {
          "title": "Connection acquire time (max)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            { "expr": "hikaricp_connections_acquire_seconds_max{application=\"$application\"}", "legendFormat": "acquire max", "refId": "A" }
          ]
        },
        {
          "title": "JVM heap used",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            { "expr": "sum(jvm_memory_used_bytes{application=\"$application\", area=\"heap\"})", "legendFormat": "heap used", "refId": "A" },
            { "expr": "sum(jvm_memory_max_bytes{application=\"$application\", area=\"heap\"})", "legendFormat": "heap max", "refId": "B" }
          ]
        },
        {
          "title": "HTTP request rate by status",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "targets": [
            { "expr": "sum by (status) (rate(http_server_requests_seconds_count{application=\"$application\"}[5m]))", "legendFormat": "{{status}}", "refId": "A" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: hyuabot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.hyuabot.app"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: storage
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: hyuabot
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300
