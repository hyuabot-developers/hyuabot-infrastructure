# Copy this file to 2.secret.yaml and replace every placeholder before applying it.
# Do not apply this example file directly.
apiVersion: v1
kind: Secret
metadata:
  name: secret
  namespace: hyuabot
type: Opaque
stringData:
  DB_ID: "<database-user>"
  DB_PASSWORD: "<database-password>"

  BUS_API_KEY: "<bus-api-key>"
  METRO_API_KEY: "<metro-api-key>"
  WEATHER_API_KEY: "<weather-api-key>"
  GOOGLE_PROJECT_ID: "<google-cloud-project-id>"

  GRAFANA_ADMIN_PASSWORD: "<grafana-admin-password>"
  GRAFANA_SMTP_FROM_ADDRESS: "<grafana-smtp-email-address>"
  GRAFANA_SMTP_PASSWORD: "<grafana-smtp-app-password>"

  APNS_TEAM_ID: "<apple-developer-team-id>"
  APNS_KEY_ID: "<apns-auth-key-id>"
  APNS_PRIVATE_KEY: |-
    -----BEGIN PRIVATE KEY-----
    <APNs Auth Key .p8 contents>
    -----END PRIVATE KEY-----

  NOTIFIER_SERVICE_TOKEN: "<backend-to-notifier-token>"
  NOTIFIER_GRAFANA_TOKEN: "<grafana-to-notifier-token>"
