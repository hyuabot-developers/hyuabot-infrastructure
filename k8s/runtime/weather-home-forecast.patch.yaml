# Strategic merge patch for an existing cluster. Apply with `kubectl patch`,
# not `kubectl apply`. The weather updater deployment workflow owns the
# immutable commit-SHA image, so this patch intentionally omits it.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: weather-cron-job
  namespace: hyuabot
spec:
  schedule: "20,50 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: weather-cron-job
            resources:
              requests:
                memory: "128Mi"
                cpu: "25m"
              limits:
                memory: "384Mi"
                cpu: "200m"
            env:
            - name: REDIS_HOST
              value: hyuabot-redis
            - name: REDIS_PORT
              value: "6379"
            - name: WEATHER_FORECAST_REDIS_KEY
              value: weather:home:erica
            - name: WEATHER_FORECAST_SHADOW_REDIS_KEY
              value: weather:home:erica:shadow
            - name: WEATHER_FORECAST_EVALUATION_REDIS_KEY
              value: weather:home:erica:evaluation
            - name: HOME_WEATHER_ENSEMBLE_MODE
              value: shadow
